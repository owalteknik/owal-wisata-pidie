<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Explore Pidie - Muhammad Owal Nifka</title>
    <!-- Framework & Library -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; scroll-behavior: smooth; }
        .bg-pattern {
            background-color: #f8fafc;
            background-image: url("https://www.transparenttextures.com/patterns/cubes.png");
        }
        .modal-enter { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }
    </style>
</head>
<body class="bg-pattern text-slate-900">
    <div id="root"></div>

    <script type="text/babel">
        // --- Komponen Ikon SVG Inline ---
        const MapPin = ({ className }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></svg>
        );
        const Heart = ({ className, filled }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill={filled ? "currentColor" : "none"} stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/></svg>
        );
        const Navigation = ({ className }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polygon points="3 11 22 2 13 21 11 13 3 11"/></svg>
        );
        const Ticket = ({ className }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M2 9a3 3 0 0 1 0 6v2a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-2a3 3 0 0 1 0-6V7a2 2 0 0 0-2-2H4a2 2 0 0 0-2 2Z"/><path d="M13 5v2"/><path d="M13 17v2"/><path d="M13 11v2"/></svg>
        );
        const MessageCircle = ({ className }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg>
        );

        // --- Komponen Modal ---
        const Modal = ({ isOpen, onClose, destination }) => {
            if (!isOpen) return null;
            return (
                <div className="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-slate-900/60 backdrop-blur-sm modal-enter" onClick={onClose}>
                    <div className="bg-white rounded-[2.5rem] max-w-2xl w-full overflow-hidden shadow-2xl" onClick={e => e.stopPropagation()}>
                        <div className="relative h-64 md:h-80">
                            <img src={destination.img} className="w-full h-full object-cover" alt={destination.name} />
                            <button onClick={onClose} className="absolute top-4 right-4 bg-white/20 backdrop-blur-md p-2 rounded-full text-white hover:bg-white hover:text-slate-900 transition-all">
                                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                            </button>
                        </div>
                        <div className="p-8 md:p-10">
                            <div className="flex items-center gap-2 text-indigo-600 font-bold text-xs uppercase tracking-widest mb-4">
                                <MapPin className="w-4 h-4" /> {destination.location}, Pidie
                            </div>
                            <h2 className="text-3xl md:text-4xl font-black mb-6 tracking-tight text-slate-900 uppercase">{destination.name}</h2>
                            <p className="text-slate-600 text-lg leading-relaxed mb-8">{destination.fullContent}</p>
                            <div className="bg-indigo-50 p-6 rounded-3xl mb-8 border border-indigo-100 flex justify-between items-center">
                                <div>
                                    <p className="text-[10px] font-black text-indigo-400 uppercase tracking-widest mb-1">Estimasi Biaya</p>
                                    <p className="text-xl font-black text-indigo-900">{destination.price}</p>
                                </div>
                                <Ticket className="text-indigo-300 w-8 h-8" />
                            </div>
                            <button onClick={onClose} className="w-full py-4 bg-slate-900 text-white rounded-2xl font-bold hover:bg-slate-800 transition-all uppercase text-xs tracking-widest">
                                Tutup
                            </button>
                        </div>
                    </div>
                </div>
            );
        };

        const App = () => {
            const [selectedPlace, setSelectedPlace] = React.useState(null);
            const [likes, setLikes] = React.useState({});
            
            const waNumber = "6288807100048"; // Nomor Owal

            const destinations = [
                {
                    id: 1,
                    name: "Tui Jerenge",
                    category: "Alam",
                    location: "Padang Tiji",
                    price: "Rp 5.000 - 10.000",
                    desc: "Pemandian alam di pedalaman hutan. Murah meriah, cocok untuk kantong mahasiswa.",
                    fullContent: "Kabupaten Pidie menyimpan banyak destinasi wisata yang luar biasa. Salah satunya adalah Tui Jerenge di Padang Tiji. Perjalanan memakan waktu 30 menit dari Sigli. Biaya masuk sangat murah, hanya berkisar 5rb - 10rb untuk parkir dan pemeliharaan area.",
                    img: "./wisata1.jpg" 
                },
                {
                    id: 2,
                    name: "Monumen Tsunami",
                    category: "Sejarah",
                    location: "Kuala Pidie",
                    price: "Gratis / Infak",
                    desc: "Situs pengingat sejarah 2004 di pusat kota. Tidak ada tiket masuk resmi.",
                    fullContent: "Berlokasi di pusat kota Sigli. Menampilkan bukti sejarah terekam apik lewat jepretan foto sebelum dan sesudah tsunami. Pengunjung bisa masuk secara gratis atau memberikan infak seikhlasnya untuk pemeliharaan museum.",
                    img: "./wisata2.jpg" 
                },
                {
                    id: 3,
                    name: "Pantai Pelangi",
                    category: "Wisata Kota",
                    location: "Kota Sigli",
                    price: "Parkir Rp 5.000",
                    desc: "Spot nongkrong favorit di depan Pendopo Bupati. Hanya bayar parkir kendaraan.",
                    fullContent: "Pantai Pelangi adalah pusat kuliner dan tempat bercengkrama warga Sigli. Tidak ada tiket masuk, pengunjung hanya perlu membayar biaya parkir sekitar 5rb rupiah untuk menikmati suasana pantai dan spot foto estetik.",
                    img: "./wisata3.jpg" 
                }
            ];

            const toggleLike = (id, e) => {
                e.stopPropagation();
                setLikes(prev => ({ ...prev, [id]: !prev[id] }));
            };

            const contactOwal = () => {
                const msg = "Halo Owal, saya ingin bertanya lebih lanjut mengenai info wisata di Pidie.";
                window.open(`https://wa.me/${waNumber}?text=${encodeURIComponent(msg)}`, '_blank');
            };

            return (
                <div className="min-h-screen flex flex-col">
                    <nav className="fixed top-0 w-full z-50 px-6 py-4">
                        <div className="max-w-6xl mx-auto bg-white/90 backdrop-blur-md rounded-3xl border border-slate-100 shadow-xl px-8 py-4 flex justify-between items-center">
                            <div className="flex items-center gap-2 cursor-pointer" onClick={() => window.scrollTo(0,0)}>
                                <div className="bg-indigo-600 p-2 rounded-xl shadow-lg flex items-center justify-center">
                                    <Navigation className="text-white w-5 h-5" />
                                </div>
                                <span className="font-black text-xl tracking-tighter uppercase">Explore<span className="text-indigo-600">Pidie</span></span>
                            </div>
                            <button onClick={contactOwal} className="bg-indigo-600 text-white px-5 py-2 rounded-full text-[10px] font-bold uppercase tracking-widest hover:bg-indigo-700 transition-all flex items-center gap-2">
                                Tanya Owal <MessageCircle className="w-4 h-4" />
                            </button>
                        </div>
                    </nav>

                    <header className="pt-40 pb-24 px-6">
                        <div className="max-w-6xl mx-auto text-center lg:text-left grid lg:grid-cols-2 gap-16 items-center">
                            <div className="order-2 lg:order-1">
                                <span className="inline-block px-4 py-1.5 bg-green-50 text-green-700 rounded-lg text-[10px] font-black uppercase tracking-[0.2em] mb-8 border border-green-100">
                                    Wisata Murah Meriah
                                </span>
                                <h1 className="text-6xl md:text-8xl font-extrabold text-slate-900 leading-[0.9] mb-10 tracking-tighter uppercase">
                                    Liburan <br/><span className="text-indigo-600 underline decoration-indigo-100">Hemat</span> di Pidie.
                                </h1>
                                <p className="text-slate-500 text-lg md:text-xl leading-relaxed mb-12 max-w-lg">
                                    Nikmati keindahan alam dan sejarah Pidie tanpa kuras dompet. Tiket & parkir mulai dari 5rb rupiah saja!
                                </p>
                                <a href="#galeri" className="bg-slate-900 text-white px-10 py-5 rounded-[2rem] font-bold flex items-center gap-3 hover:bg-slate-800 transition-all shadow-2xl">
                                    Cek Daftar Harga
                                </a>
                            </div>
                            <div className="order-1 lg:order-2 relative group cursor-pointer" onClick={() => setSelectedPlace(destinations[0])}>
                                <div className="absolute -inset-4 bg-indigo-100 rounded-[4rem] rotate-6 opacity-30 animate-pulse"></div>
                                <div className="relative rounded-[3.5rem] overflow-hidden shadow-2xl border-8 border-white aspect-[4/5] bg-slate-200">
                                    <img src="./wisata1.jpg" className="w-full h-full object-cover" alt="Tui Jerenge" onError={(e) => e.target.src="https://images.unsplash.com/photo-1501785888041-af3ef285b470?q=80&w=800"}/>
                                    <div className="absolute inset-0 bg-gradient-to-t from-indigo-900/80 via-transparent to-transparent"></div>
                                    <div className="absolute bottom-10 left-10 text-white text-left">
                                        <p className="text-xs font-bold uppercase tracking-[0.3em] mb-2 text-indigo-300 italic">Mulai 5rb Rupiah</p>
                                        <h3 className="text-3xl font-black italic tracking-tight uppercase">Tui Jerenge</h3>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </header>

                    <section id="galeri" className="py-32 px-6 bg-white">
                        <div className="max-w-6xl mx-auto">
                            <div className="flex flex-col items-center text-center mb-24">
                                <h2 className="text-4xl md:text-5xl font-black text-slate-900 mb-6 tracking-tight uppercase">Wisata Pilihan</h2>
                                <div className="h-1.5 w-24 bg-indigo-600 rounded-full mb-8"></div>
                                <p className="text-slate-500 max-w-xl text-lg">Pilihan destinasi dengan biaya operasional yang sangat terjangkau.</p>
                            </div>

                            <div className="grid md:grid-cols-3 gap-12">
                                {destinations.map((item) => (
                                    <div key={item.id} onClick={() => setSelectedPlace(item)} className="group bg-slate-50 rounded-[3rem] overflow-hidden border border-slate-100 transition-all duration-700 hover:shadow-2xl hover:shadow-indigo-100 hover:-translate-y-4 cursor-pointer">
                                        <div className="relative h-72 overflow-hidden">
                                            <img src={item.img} className="w-full h-full object-cover transition-transform duration-1000 group-hover:scale-110" alt={item.name} onError={(e) => e.target.src="https://images.unsplash.com/photo-1501785888041-af3ef285b470?q=80&w=600"}/>
                                            <div className="absolute top-6 left-6 flex gap-2">
                                                <span className="bg-white/90 backdrop-blur-md px-4 py-2 rounded-2xl text-[10px] font-black text-indigo-600 uppercase tracking-widest border border-white/50">
                                                    {item.category}
                                                </span>
                                                <span className="bg-green-600 text-white px-4 py-2 rounded-2xl text-[10px] font-black uppercase tracking-widest shadow-lg">
                                                    {item.price}
                                                </span>
                                            </div>
                                            <button onClick={(e) => toggleLike(item.id, e)} className={`absolute top-6 right-6 p-3 rounded-2xl backdrop-blur-md transition-all ${likes[item.id] ? 'bg-red-500 text-white' : 'bg-white/20 text-white hover:bg-white hover:text-red-500'}`}>
                                                <Heart className="w-5 h-5" filled={likes[item.id]} />
                                            </button>
                                        </div>
                                        <div className="p-10 text-left">
                                            <div className="flex items-center gap-2 text-indigo-600 font-bold text-[10px] uppercase tracking-widest mb-4">
                                                <MapPin className="w-3.5 h-3.5" /> {item.location}
                                            </div>
                                            <h4 className="text-2xl font-black mb-4 text-slate-800 tracking-tight uppercase group-hover:text-indigo-600 transition-colors">{item.name}</h4>
                                            <p className="text-slate-500 leading-relaxed text-sm mb-8 italic">"{item.desc}"</p>
                                            <div className="w-full py-4 bg-white border border-slate-200 rounded-2xl font-bold text-slate-400 group-hover:bg-indigo-600 group-hover:text-white group-hover:border-indigo-600 transition-all flex items-center justify-center gap-2 uppercase text-xs tracking-widest">
                                                Detail Biaya
                                            </div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </section>

                    <footer id="profile" className="py-32 bg-slate-900 text-white mt-auto">
                        <div className="max-w-6xl mx-auto px-6 text-center flex flex-col items-center">
                            <div className="w-32 h-32 mb-10 relative group">
                                <div className="absolute -inset-2 bg-indigo-600 rounded-[2.5rem] rotate-6 group-hover:rotate-0 transition-all duration-500 opacity-20"></div>
                                <div className="relative w-full h-full bg-white rounded-[2.5rem] overflow-hidden border-4 border-white shadow-2xl rotate-3 group-hover:rotate-0 transition-all duration-500">
                                    <img src="./profil_owal.jpg" className="w-full h-full object-cover" alt="Owal Nifka" onError={(e) => e.target.src="https://images.unsplash.com/photo-1633332755192-727a05c4013d?q=80&w=400"} />
                                </div>
                            </div>
                            <h3 className="text-4xl font-black mb-4 uppercase">Muhammad Owal Nifka</h3>
                            <p className="text-indigo-400 font-bold tracking-[0.4em] uppercase text-xs mb-12">NPM: 23105111113</p>
                            
                            <div className="flex flex-wrap justify-center gap-6 mb-16">
                                <button onClick={contactOwal} className="flex items-center gap-3 px-8 py-4 bg-white/5 border border-white/10 rounded-2xl hover:bg-white/10 transition-all group">
                                    <MessageCircle className="w-5 h-5 text-indigo-400 group-hover:scale-110 transition-transform" />
                                    <span className="text-xs font-black uppercase tracking-widest">Hubungi: 0888-0710-0048</span>
                                </button>
                            </div>

                            <div className="h-px w-full bg-white/10 mb-12"></div>
                            <div className="flex flex-col md:flex-row justify-between items-center w-full gap-8 text-[10px] font-bold uppercase tracking-[0.3em] text-slate-500">
                                <span>© 2024 Explore Pidie Digital</span>
                                <div className="flex items-center gap-2">
                                    Made with <Heart className="w-3 h-3 fill-red-500 text-red-500 inline-block animate-pulse" filled={true} /> for Pidie
                                </div>
                            </div>
                        </div>
                    </footer>

                    <Modal isOpen={!!selectedPlace} onClose={() => setSelectedPlace(null)} destination={selectedPlace || {}} />
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>

```
